name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - name: Verify release architecture
        run: test "$(uname -m)" = "arm64"
      - name: Test
        env:
          AGENTSHELL_SKIP_NATIVE_RELEASE_BUILD: "1"
        run: npm test
      - run: npm run security:scan
      - run: npm run plugin:validate:source
      - run: npm run product:readiness -- --heavy --dry-run --compact
      - run: npm run release:gate -- --tag "${GITHUB_REF_NAME}"
      - run: npm run release:artifacts
      - name: Verify release payload
        run: |
          npm run plugin:smoke -- --path artifacts/release/agentshell-codex-plugin
          cd artifacts/release
          shasum -a 256 -c agentshell-codex-plugin.zip.sha256
          shasum -a 256 -c agentshell-darwin-arm64.sha256
          ./agentshell-darwin-arm64 --version
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          artifacts/release/agentshell-darwin-arm64
          artifacts/release/agentshell-darwin-arm64.sha256
          artifacts/release/agentshell-codex-plugin.zip
          artifacts/release/agentshell-codex-plugin.zip.sha256
          artifacts/release/release-report.json
          --title "AgentShell ${GITHUB_REF_NAME}"
          --generate-notes
