name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: npm run security:scan
      - run: npm run release:gate -- --tag "${GITHUB_REF_NAME}"
      - run: npm run release:artifacts
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          artifacts/release/agentshell-codex-plugin.zip
          artifacts/release/agentshell-codex-plugin.zip.sha256
          artifacts/release/release-report.json
          --title "AgentShell ${GITHUB_REF_NAME}"
          --generate-notes
