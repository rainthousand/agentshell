name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20.20.2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20
      - name: Verify release architecture
        run: test "$(uname -m)" = "arm64"
      - name: Prepare test-only standalone launcher
        run: node scripts/prepare-test-standalone.js
      - name: Test
        env:
          AGENTSHELL_TEST_STANDALONE_LAUNCHER: "1"
        run: npm test
      - name: Scan source for secrets and local paths
        run: npm run security:scan
      - name: Validate Codex plugin source
        run: npm run plugin:validate:source
      - name: Run product readiness gates
        run: npm run product:readiness -- --heavy --dry-run --compact
      - name: Validate tag and release metadata
        run: npm run release:gate -- --tag "${GITHUB_REF_NAME}"
      - name: Build release artifacts
        run: npm run release:artifacts
      - name: Verify release payload
        run: |
          node tests/ci-verify-release-artifacts.js \
            --dir artifacts/release \
            --require-toolchain \
            --node 20.20.2 \
            --bun 1.2.20
          npm run plugin:smoke -- --path artifacts/release/agentshell-codex-plugin
          artifacts/release/agentshell-darwin-arm64 --version
      - name: Upload audited release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentshell-${{ github.ref_name }}
          path: |
            artifacts/release/agentshell-darwin-arm64
            artifacts/release/agentshell-darwin-arm64.sha256
            artifacts/release/agentshell-codex-plugin.zip
            artifacts/release/agentshell-codex-plugin.zip.sha256
            artifacts/release/release-report.json
          if-no-files-found: error
          retention-days: 30
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          artifacts/release/agentshell-darwin-arm64
          artifacts/release/agentshell-darwin-arm64.sha256
          artifacts/release/agentshell-codex-plugin.zip
          artifacts/release/agentshell-codex-plugin.zip.sha256
          artifacts/release/release-report.json
          --title "AgentShell ${GITHUB_REF_NAME}"
          --generate-notes
