name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Test
        env:
          AGENTSHELL_SKIP_NATIVE_RELEASE_BUILD: "1"
        run: npm test
      - if: runner.os == 'macOS'
        run: npm run dashboard:build-app

  product-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run security:scan
      - run: npm run plugin:validate:source
      - run: npm run product:readiness -- --heavy --dry-run --compact
      - run: npm run release:gate
