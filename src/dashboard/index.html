<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>AgentShell Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell" aria-label="AgentShell savings">
      <section class="metric metric-tokens">
        <span>Verified tokens saved</span>
        <strong id="tokens-saved">--</strong>
      </section>
      <section class="metric metric-time">
        <span>Verified time saved</span>
        <strong id="time-saved">--</strong>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
